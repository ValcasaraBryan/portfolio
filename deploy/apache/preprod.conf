<VirtualHost *:80>
    ServerName preprod.bryanvalcasara.com

    RewriteEngine On
    # Laisser passer la validation Certbot
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    # Tout le reste → HTTPS
    RewriteRule ^ https://preprod.bryanvalcasara.com%{REQUEST_URI} [R=301,L]
RewriteCond %{SERVER_NAME} =preprod.bryanvalcasara.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
