<VirtualHost *:80>
    ServerName bryanvalcasara.com
    ServerAlias www.bryanvalcasara.com

    RewriteEngine On
    # Laisser passer la validation Certbot
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    # Tout le reste → HTTPS sur le domaine (IP ou autre hostname)
    RewriteRule ^ https://bryanvalcasara.com%{REQUEST_URI} [R=301,L]
</VirtualHost>
