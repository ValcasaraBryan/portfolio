<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName bryanvalcasara.com
    ServerAlias www.bryanvalcasara.com
    DocumentRoot /home/ubuntu/portfolio/site

    # Rediriger vers le domaine si accès par IP ou autre hostname
    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^(bryanvalcasara\.com|www\.bryanvalcasara\.com)$ [NC]
    RewriteRule ^ https://bryanvalcasara.com%{REQUEST_URI} [R=301,L]

    <Directory /home/ubuntu/portfolio/site>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/portfolio_error.log
    CustomLog ${APACHE_LOG_DIR}/portfolio_access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/bryanvalcasara.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bryanvalcasara.com/privkey.pem
</VirtualHost>
</IfModule>
