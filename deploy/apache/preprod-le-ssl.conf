<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName preprod.bryanvalcasara.com
    DocumentRoot /home/ubuntu/preprod-portfolio/site

    # Rediriger si accès par IP ou autre hostname
    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^preprod\.bryanvalcasara\.com$ [NC]
    RewriteRule ^ https://preprod.bryanvalcasara.com%{REQUEST_URI} [R=301,L]

    <Directory /home/ubuntu/preprod-portfolio/site>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/preprod_error.log
    CustomLog ${APACHE_LOG_DIR}/preprod_access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/preprod.bryanvalcasara.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/preprod.bryanvalcasara.com/privkey.pem
</VirtualHost>
</IfModule>
