<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Portefolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@18.2.0",
      "react/jsx-runtime":  "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client":   "https://esm.sh/react-dom@18.2.0/client",
      "@emotion/react":     "https://esm.sh/@emotion/react@11.11.0?deps=react@18.2.0",
      "@emotion/styled":    "https://esm.sh/@emotion/styled@11.11.0?deps=react@18.2.0,@emotion/react@11.11.0",
      "@mui/material":      "https://esm.sh/@mui/material@5.15.0?deps=react@18.2.0,react-dom@18.2.0,@emotion/react@11.11.0,@emotion/styled@11.11.0",
      "@mui/icons-material":"https://esm.sh/@mui/icons-material@5.15.0?deps=react@18.2.0,@mui/material@5.15.0"
    }
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #111; color: #fff; }
    #root { display: flex; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useCallback } from 'react';
    import { createRoot }    from 'react-dom/client';
    import {
      Box, Drawer, List, ListItem, ListItemButton, ListItemText,
      AppBar, Toolbar, Typography, Button, IconButton,
      Table, TableBody, TableCell, TableContainer, TableHead, TableRow, Paper,
      Dialog, DialogTitle, DialogContent, DialogActions,
      TextField, Alert, Snackbar, CircularProgress, Chip, Autocomplete,
      MenuItem, Divider, createTheme, ThemeProvider, CssBaseline,
    } from '@mui/material';
    import { Star, StarBorder, Delete, ExpandMore } from '@mui/icons-material';

    const API = '../api';
    const DRAWER_WIDTH = 220;

    /* ── Enum canonique EN + labels bilingues ─────────────────── */
    const EXP_TYPE_MAP = [
      { key: 'internship',          fr: 'Stage',       en: 'Internship' },
      { key: 'permanent_contract',  fr: 'CDI',         en: 'Permanent contract' },
      { key: 'fixed_term_contract', fr: 'CDD',         en: 'Fixed-term contract' },
      { key: 'work_study',          fr: 'Alternance',  en: 'Work-study' },
      { key: 'freelance',           fr: 'Freelance',   en: 'Freelance' },
      { key: 'self_employed',       fr: 'Indépendant', en: 'Self-employed' },
    ];

    const theme = createTheme({
      palette: {
        mode: 'dark',
        primary:    { main: '#7ED9B1' },
        background: { default: '#111', paper: '#1a1a1a' },
      },
      typography: { fontFamily: "'Inter', sans-serif" },
    });

    /* ── generic fetch helpers ─────────────────────────────── */
    const apiFetch = async (path, opts = {}) => {
      const res = await fetch(`${API}/${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    };

    /* ── SECTIONS CONFIG ───────────────────────────────────── */
    const SECTIONS = [
      { id: 'experiences', label: 'Experiences', endpoint: 'experiences.php',
        bilingual: true,
        columns: ['company','role','type','location','start_date','end_date','skills'],
        fields: [
          { key: 'company' },
          { key: 'location',    suggestions: rows => [...new Set(rows.map(r => r.location).filter(Boolean))] },
          { key: 'start_date' },
          { key: 'end_date' },
          { key: 'type', type: 'type_selector' },
          { key: '_sep_fr', type: 'separator', label: '🇫🇷 Français' },
          { key: 'role',        label: 'Rôle (FR)' },
          { key: 'description', label: 'Description (FR)' },
          { key: '_sep_en', type: 'separator', label: '🇬🇧 English' },
          { key: 'role_en',        label: 'Role (EN)' },
          { key: 'description_en', label: 'Description (EN)' },
          { key: 'skill_ids', type: 'skills', label: 'Skills' },
        ],
      },
      { id: 'projects', label: 'Projects', endpoint: 'projects.php',
        columns: ['is_favorite','name','category','url','github_url','skills'],
        fields: [
          { key: 'name' },
          { key: 'photo_url', type: 'image_upload', uploadType: 'project', label: 'Photo' },
          { key: 'description' },
          { key: 'date' },
          { key: 'url' },
          { key: 'github_url' },
          { key: 'category', suggestions: ['web','opensource','side'] },
          { key: 'skill_ids', type: 'skills', label: 'Skills' },
        ],
      },
      { id: 'formations', label: 'Education', endpoint: 'formations.php',
        columns: ['school','title','level','city','skills','certifications'],
        fields: [
          { key: 'school',   suggestions: rows => [...new Set(rows.map(r => r.school).filter(Boolean))] },
          { key: 'title' },
          { key: 'level',    suggestions: rows => [...new Set(rows.map(r => r.level).filter(Boolean))] },
          { key: 'city',     suggestions: rows => [...new Set(rows.map(r => r.city).filter(Boolean))] },
          { key: 'start_date' },
          { key: 'end_date' },
          { key: 'description' },
          { key: 'mention' },
          { key: 'skill_ids', type: 'skills', label: 'Skills' },
        ],
      },
      { id: 'skills', label: 'Skills', endpoint: 'skills.php',
        columns: ['name_fr','name_en','category_fr','category_en'],
        fields: [
          { key: 'name_fr' },
          { key: 'name_en' },
          { key: 'category_fr', suggestions: rows => [...new Set(rows.map(r => r.category_fr).filter(Boolean))] },
          { key: 'category_en', suggestions: rows => [...new Set(rows.map(r => r.category_en).filter(Boolean))] },
        ],
      },
      { id: 'contact', label: 'Messages', endpoint: 'contact.php',
        columns: ['name','email','sent_at'],
        fields: [],
        readonly: true,
      },
      { id: 'links', label: 'Liens sociaux', endpoint: 'links.php',
        bilingual: false,
        columns: ['platform','url','icon'],
        fields: [
          { key: 'platform', suggestions: ['GitHub','LinkedIn','Email','Twitter','Behance','Dribbble'] },
          { key: 'url' },
          { key: 'icon', type: 'image_upload', uploadType: 'link', label: 'Icône (image ou emoji)' },
        ],
      },
    ];

    /* ── SKILLS PICKER ─────────────────────────────────────── */
    function SkillsPicker({ value, onChange }) {
      const [allSkills, setAllSkills] = useState([]);

      useEffect(() => {
        apiFetch('skills.php?lang=fr')
          .then(data => setAllSkills(data ?? []))
          .catch(() => {});
      }, []);

      const byCategory = allSkills.reduce((acc, s) => {
        (acc[s.category] ??= []).push(s);
        return acc;
      }, {});

      const selected = new Set(value ?? []);

      const toggle = id => {
        const next = new Set(selected);
        if (next.has(id)) next.delete(id); else next.add(id);
        onChange([...next]);
      };

      if (!allSkills.length) return React.createElement(CircularProgress, { size: 20, color: 'primary' });

      return React.createElement(Box, { sx: { border: '1px solid #333', borderRadius: 1, p: 1.5 } },
        React.createElement(Typography, { variant: 'caption', sx: { color: 'text.secondary', display: 'block', mb: 1.5 } }, 'Skills'),
        ...Object.entries(byCategory).map(([cat, items]) =>
          React.createElement(Box, { key: cat, sx: { mb: 1.5 } },
            React.createElement(Typography, { variant: 'caption', sx: { color: '#7ED9B1', display: 'block', mb: 0.5, fontWeight: 600 } }, cat),
            React.createElement(Box, { sx: { display: 'flex', flexWrap: 'wrap', gap: 0.5 } },
              ...items.map(s =>
                React.createElement(Chip, {
                  key:       s.id,
                  label:     s.name,
                  size:      'small',
                  clickable: true,
                  onClick:   () => toggle(s.id),
                  color:     selected.has(s.id) ? 'primary' : 'default',
                  variant:   selected.has(s.id) ? 'filled'  : 'outlined',
                  sx:        { fontSize: '0.7rem' },
                })
              )
            )
          )
        )
      );
    }

    /* ── TYPE SELECTOR (exp) ──────────────────────────────── */
    function TypeSelector({ form, setForm }) {
      const current = form.type ?? '';                          // clé enum (ex: 'work_study')
      const entry   = EXP_TYPE_MAP.find(e => e.key === current);

      const handleChange = key => {
        const match = EXP_TYPE_MAP.find(e => e.key === key);
        setForm(prev => ({
          ...prev,
          type:    key,              // clé enum → stockée dans experiences.type
          type_fr: match?.fr ?? key, // label FR → stocké dans experience_translations
          type_en: match?.en ?? key, // label EN → stocké dans experience_translations
        }));
      };

      return React.createElement(Box, { sx: { display: 'flex', flexDirection: 'column', gap: 0.5 } },
        React.createElement(TextField, {
          select: true,
          label: 'Type',
          size: 'small',
          value: current,
          onChange: e => handleChange(e.target.value),
          fullWidth: true,
        },
          React.createElement(MenuItem, { value: '' }, '—'),
          ...EXP_TYPE_MAP.map(e =>
            React.createElement(MenuItem, { key: e.key, value: e.key },
              `${e.fr}  /  ${e.en}`
            )
          )
        ),
        entry && React.createElement(Typography, {
          variant: 'caption',
          sx: { color: '#7ED9B1', pl: 1 },
        }, `→ FR : "${entry.fr}" · EN : "${entry.en}"`)
      );
    }

    /* ── IMAGE PICKER FIELD ──────────────────────────────── */
    function ImagePickerField({ value, onChange, uploadType, label }) {
      const [uploading, setUploading] = useState(false);
      const [error,     setError]     = useState(null);

      const isPreviewable = v => typeof v === 'string' && v.trim() !== '' &&
        (v.startsWith('http') || v.startsWith('/'));

      const handleUpload = () => {
        const input = document.createElement('input');
        input.type   = 'file';
        input.accept = 'image/*';
        input.onchange = async () => {
          const file = input.files[0];
          if (!file) return;
          setUploading(true);
          setError(null);
          try {
            const fd = new FormData();
            fd.append('image', file);
            const res = await fetch(`${API}/upload.php?type=${uploadType}`, {
              method: 'POST',
              body: fd,
              /* Pas de Content-Type : le navigateur gère le boundary multipart */
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error ?? 'Erreur upload');
            onChange(data.url);
          } catch (e) {
            setError(e.message);
          } finally {
            setUploading(false);
          }
        };
        input.click();
      };

      return React.createElement(Box, { sx: { display: 'flex', flexDirection: 'column', gap: 1 } },
        /* Label */
        React.createElement(Typography, {
          variant: 'caption',
          sx: { color: 'text.secondary', fontWeight: 500 },
        }, label),

        /* Prévisualisation */
        isPreviewable(value) && React.createElement(Box, {
          sx: { width: 80, height: 80, border: '1px solid #333', borderRadius: 1,
                overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: '#222' },
        },
          React.createElement('img', {
            src: value, alt: 'Aperçu',
            style: { maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' },
          })
        ),

        /* Ligne : champ texte + bouton upload */
        React.createElement(Box, { sx: { display: 'flex', gap: 1, alignItems: 'center' } },
          React.createElement(TextField, {
            size: 'small',
            placeholder: 'URL ou emoji…',
            value: value ?? '',
            onChange: e => onChange(e.target.value || null),
            sx: { flex: 1 },
          }),
          React.createElement(Button, {
            variant: 'outlined', size: 'small',
            disabled: uploading,
            onClick:  handleUpload,
            sx: { whiteSpace: 'nowrap', minWidth: 110 },
          }, uploading ? 'Envoi…' : '📁 Uploader'),
          value && React.createElement(Button, {
            variant: 'outlined', size: 'small', color: 'error',
            onClick: () => onChange(null),
            sx: { minWidth: 32, px: 0.5 },
          }, '✕'),
        ),

        /* Erreur upload */
        error && React.createElement(Typography, {
          variant: 'caption', sx: { color: 'error.main' },
        }, error),
      );
    }

    /* ── AUTO FIELD ───────────────────────────────────────── */
    function AutoField({ fieldDef, form, setForm, rows }) {
      const key   = fieldDef.key;
      const label = fieldDef.label
        ?? key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      const raw   = fieldDef.suggestions;
      const opts  = raw ? (typeof raw === 'function' ? raw(rows) : raw) : null;
      const value = String(form[key] ?? '');
      const isMultiline = key === 'description' || key === 'description_en';

      /* Sélecteur de type bilingue */
      if (fieldDef.type === 'type_selector') {
        return React.createElement(TypeSelector, { key, form, setForm });
      }

      /* Séparateur de section FR / EN */
      if (fieldDef.type === 'separator') {
        return React.createElement(Box, {
          key,
          sx: { borderBottom: '1px solid #333', pb: 0.5, mt: 1 },
        },
          React.createElement(Typography, {
            variant: 'caption',
            sx: { color: '#7ED9B1', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' },
          }, label)
        );
      }

      /* Upload d'image (projets, liens) */
      if (fieldDef.type === 'image_upload') {
        return React.createElement(ImagePickerField, {
          key,
          label,
          value:      form[key] ?? null,
          uploadType: fieldDef.uploadType,
          onChange:   url => setForm(prev => ({ ...prev, [key]: url ?? '' })),
        });
      }

      if (opts) {
        return React.createElement(Autocomplete, {
          key,
          freeSolo: true,
          options: opts,
          inputValue: value,
          onInputChange: (_, v) => setForm(prev => ({ ...prev, [key]: v })),
          renderInput: params => React.createElement(TextField, { ...params, label, size: 'small' }),
        });
      }

      return React.createElement(TextField, {
        key,
        label,
        size: 'small',
        value,
        onChange:  e => setForm(prev => ({ ...prev, [key]: e.target.value })),
        multiline: isMultiline,
        rows:      isMultiline ? 4 : 1,
      });
    }

    /* ── PROFILE FORM ─────────────────────────────────────── */
    function ProfileForm() {
      const [form,    setForm]    = useState({});
      const [loading, setLoading] = useState(true);
      const [saving,  setSaving]  = useState(false);
      const [snack,   setSnack]   = useState(null);

      useEffect(() => {
        Promise.all([
          apiFetch('profile.php?lang=fr'),
          apiFetch('profile.php?lang=en'),
        ]).then(([fr, en]) => {
          setForm({
            name:      fr.name      ?? '',
            photo_url: fr.photo_url ?? '',
            location:  fr.location  ?? '',
            email:     fr.email     ?? '',
            phone:     fr.phone     ?? '',
            title_fr:  fr.title     ?? '',
            status_fr: fr.status    ?? '',
            bio_fr:    fr.bio       ?? '',
            title_en:  en.title     ?? '',
            status_en: en.status    ?? '',
            bio_en:    en.bio       ?? '',
          });
          setLoading(false);
        }).catch(() => {
          setSnack({ msg: 'Failed to load profile', sev: 'error' });
          setLoading(false);
        });
      }, []);

      const field = (key, label, multiline = false, rows = null) =>
        React.createElement(TextField, {
          key, label, size: 'small',
          value:    form[key] ?? '',
          onChange: e => setForm(prev => ({ ...prev, [key]: e.target.value })),
          multiline, rows: rows ?? (multiline ? 4 : 1),
        });

      const separator = label =>
        React.createElement(Box, {
          key: label,
          sx: { borderBottom: '1px solid #333', pb: 0.5, mt: 1 },
        },
          React.createElement(Typography, {
            variant: 'caption',
            sx: { color: '#7ED9B1', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' },
          }, label)
        );

      const save = async () => {
        setSaving(true);
        try {
          await apiFetch('profile.php', { method: 'PUT', body: JSON.stringify(form) });
          setSnack({ msg: 'Profil enregistré', sev: 'success' });
        } catch {
          setSnack({ msg: 'Échec de la sauvegarde', sev: 'error' });
        } finally {
          setSaving(false);
        }
      };

      if (loading) return React.createElement(Box, { sx: { p: 4, textAlign: 'center' } },
        React.createElement(CircularProgress, { color: 'primary' }));

      return React.createElement(Box, { sx: { maxWidth: 600 } },
        React.createElement(Typography, { variant: 'h6', sx: { mb: 3 } }, 'Profil'),

        React.createElement(Box, { sx: { display: 'flex', flexDirection: 'column', gap: 2 } },
          field('name',      'Nom'),
          field('photo_url', 'Photo URL'),
          field('location',  'Localisation'),
          field('email',     'E-mail'),
          field('phone',     'Téléphone'),
          separator('🇫🇷 Français'),
          field('title_fr',  'Titre (FR)'),
          field('status_fr', 'Statut (FR)'),
          field('bio_fr',    'Bio (FR)', true),
          separator('🇬🇧 English'),
          field('title_en',  'Title (EN)'),
          field('status_en', 'Status (EN)'),
          field('bio_en',    'Bio (EN)', true),
        ),

        React.createElement(Box, { sx: { mt: 3 } },
          React.createElement(Button, {
            variant: 'contained', onClick: save, disabled: saving,
          }, saving ? 'Enregistrement…' : 'Enregistrer'),
        ),

        React.createElement(Snackbar, {
          open: !!snack, autoHideDuration: 3000,
          onClose: () => setSnack(null),
          anchorOrigin: { vertical: 'bottom', horizontal: 'center' },
        },
          snack && React.createElement(Alert, { severity: snack.sev, variant: 'filled' }, snack.msg)
        ),
      );
    }

    /* ── CV SECTION ───────────────────────────────────────── */
    function CvSection() {
      const [cvFr,    setCvFr]    = useState(null);   // { exists, url, updated_at } | null
      const [cvEn,    setCvEn]    = useState(null);
      const [loading, setLoading] = useState(true);
      const [snack,   setSnack]   = useState(null);

      const loadMeta = async () => {
        setLoading(true);
        try {
          const [fr, en] = await Promise.all([
            fetch(`${API}/cv.php?lang=fr`).then(r => r.json()),
            fetch(`${API}/cv.php?lang=en`).then(r => r.json()),
          ]);
          setCvFr(fr);
          setCvEn(en);
        } catch {
          setSnack({ msg: 'Impossible de charger les métadonnées CV', sev: 'error' });
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { loadMeta(); }, []);

      const upload = async lang => {
        const input = document.createElement('input');
        input.type   = 'file';
        input.accept = 'application/pdf';
        input.onchange = async () => {
          const file = input.files[0];
          if (!file) return;
          const fd = new FormData();
          fd.append('cv', file);
          try {
            const res = await fetch(`${API}/cv.php?lang=${lang}`, { method: 'POST', body: fd });
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error ?? 'Erreur serveur');
            }
            setSnack({ msg: `CV ${lang.toUpperCase()} uploadé avec succès`, sev: 'success' });
            loadMeta();
          } catch (e) {
            setSnack({ msg: e.message, sev: 'error' });
          }
        };
        input.click();
      };

      const remove = async lang => {
        if (!window.confirm(`Supprimer le CV ${lang.toUpperCase()} ?`)) return;
        try {
          const res = await fetch(`${API}/cv.php?lang=${lang}`, { method: 'DELETE' });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error ?? 'Erreur serveur');
          }
          setSnack({ msg: `CV ${lang.toUpperCase()} supprimé`, sev: 'info' });
          loadMeta();
        } catch (e) {
          setSnack({ msg: e.message, sev: 'error' });
        }
      };

      const CvCard = ({ lang, meta }) => {
        const exists     = meta?.exists ?? false;
        const updatedAt  = exists && meta.updated_at
          ? new Date(meta.updated_at).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
          : null;

        return React.createElement(Box, {
          sx: {
            border: '1px solid #333', borderRadius: 2, p: 2.5, mb: 2,
            background: '#141414',
          },
        },
          React.createElement(Typography, {
            variant: 'subtitle1', sx: { fontWeight: 700, mb: 1 },
          }, lang === 'fr' ? '🇫🇷 CV Français' : '🇬🇧 CV English'),

          exists
            ? React.createElement(Typography, {
                variant: 'body2', sx: { color: '#7ED9B1', mb: 2 },
              }, `✓ Présent — mis à jour le ${updatedAt}`)
            : React.createElement(Typography, {
                variant: 'body2', sx: { color: '#888', mb: 2 },
              }, 'Aucun CV uploadé'),

          React.createElement(Box, { sx: { display: 'flex', gap: 1, flexWrap: 'wrap' } },
            React.createElement(Button, {
              variant:  'contained',
              size:     'small',
              onClick:  () => upload(lang),
            }, exists ? 'Remplacer le PDF' : 'Uploader un PDF'),

            exists && React.createElement(Button, {
              variant:  'outlined',
              size:     'small',
              href:     `../${meta.url}`,
              target:   '_blank',
              rel:      'noopener',
            }, 'Télécharger'),

            exists && React.createElement(Button, {
              variant:  'outlined',
              size:     'small',
              color:    'error',
              onClick:  () => remove(lang),
            }, 'Supprimer'),
          )
        );
      };

      if (loading) return React.createElement(Box, { sx: { p: 4, textAlign: 'center' } },
        React.createElement(CircularProgress, { color: 'primary' }));

      return React.createElement(Box, { sx: { maxWidth: 600 } },
        React.createElement(Typography, { variant: 'h6', sx: { mb: 3 } }, 'CV'),
        React.createElement(Typography, { variant: 'body2', sx: { color: '#888', mb: 3 } },
          'Uploadez un PDF par langue. Le visiteur téléchargera automatiquement la version correspondant à sa langue active.'),

        React.createElement(CvCard, { lang: 'fr', meta: cvFr }),
        React.createElement(CvCard, { lang: 'en', meta: cvEn }),

        React.createElement(Snackbar, {
          open: !!snack, autoHideDuration: 4000,
          onClose: () => setSnack(null),
          anchorOrigin: { vertical: 'bottom', horizontal: 'center' },
        },
          snack && React.createElement(Alert, { severity: snack.sev, variant: 'filled' }, snack.msg)
        ),
      );
    }

    /* ── i18n UTILITIES ───────────────────────────────────── */

    // Aplatit { contact: { form: { name_label: "Nom" } } } → { "contact.form.name_label": "Nom" }
    function flattenI18n(obj, prefix = '') {
      return Object.entries(obj).reduce((acc, [k, v]) => {
        const key = prefix ? `${prefix}.${k}` : k;
        if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
          Object.assign(acc, flattenI18n(v, key));
        } else {
          acc[key] = String(v ?? '');
        }
        return acc;
      }, {});
    }

    // Inverse : "contact.form.name_label" → { contact: { form: { name_label: "Nom" } } }
    function unflattenI18n(flat) {
      return Object.entries(flat).reduce((acc, [path, val]) => {
        const parts = path.split('.');
        let cur = acc;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
          cur = cur[parts[i]];
        }
        cur[parts[parts.length - 1]] = val;
        return acc;
      }, {});
    }

    // Groupe les clés aplaties par section top-level
    function groupBySection(flatKeys) {
      return Object.keys(flatKeys).reduce((acc, key) => {
        const section = key.split('.')[0];
        if (!acc[section]) acc[section] = [];
        acc[section].push(key);
        return acc;
      }, {});
    }

    /* ── TRANSLATIONS EDITOR ──────────────────────────────── */
    function TranslationsEditor() {
      const [flatFr,   setFlatFr]   = useState({});
      const [flatEn,   setFlatEn]   = useState({});
      const [original, setOriginal] = useState(null);
      const [loading,  setLoading]  = useState(true);
      const [saving,   setSaving]   = useState(false);
      const [snack,    setSnack]    = useState(null);
      const [expanded, setExpanded] = useState(new Set());

      useEffect(() => {
        apiFetch('i18n.php')
          .then(data => {
            const fr = flattenI18n(data.fr);
            const en = flattenI18n(data.en);
            setFlatFr(fr);
            setFlatEn(en);
            setOriginal(JSON.stringify({ fr, en }));
          })
          .catch(() => setSnack({ msg: 'Erreur de chargement des traductions.', sev: 'error' }))
          .finally(() => setLoading(false));
      }, []);

      const isDirty = original !== null
        && JSON.stringify({ fr: flatFr, en: flatEn }) !== original;

      const save = async () => {
        setSaving(true);
        try {
          await apiFetch('i18n.php', {
            method: 'PUT',
            body: JSON.stringify({ fr: unflattenI18n(flatFr), en: unflattenI18n(flatEn) }),
          });
          setOriginal(JSON.stringify({ fr: flatFr, en: flatEn }));
          setSnack({ msg: 'Traductions enregistrées.', sev: 'success' });
        } catch {
          setSnack({ msg: 'Erreur lors de la sauvegarde.', sev: 'error' });
        } finally {
          setSaving(false);
        }
      };

      if (loading) return React.createElement(Box, { sx: { p: 4, textAlign: 'center' } },
        React.createElement(CircularProgress, { color: 'primary' }));

      const grouped  = groupBySection(flatFr);
      const sections = ['nav', 'about', 'common', 'experiences', 'creations', 'formations', 'contact']
        .filter(s => grouped[s]);

      return React.createElement(Box, { sx: { maxWidth: 900 } },

        /* En-tête + bouton Enregistrer */
        React.createElement(Box, { sx: { display: 'flex', alignItems: 'center', mb: 3, gap: 2 } },
          React.createElement(Typography, { variant: 'h6', sx: { flexGrow: 1 } }, 'Traductions'),
          React.createElement(Button, {
            variant:  'contained',
            color:    'primary',
            disabled: !isDirty || saving,
            onClick:  save,
          }, saving
            ? React.createElement(CircularProgress, { size: 16, color: 'inherit' })
            : (isDirty ? 'Enregistrer *' : 'Enregistrer')
          ),
        ),

        /* Sections dépliables (custom — sans MUI Accordion) */
        ...sections.map(section => {
          const isOpen = expanded.has(section);
          const toggle = () => setExpanded(prev => {
            const next = new Set(prev);
            next.has(section) ? next.delete(section) : next.add(section);
            return next;
          });
          return React.createElement(Box, {
            key: section,
            sx: { background: '#1a1a1a', mb: 1, borderRadius: 1, overflow: 'hidden', border: '1px solid #2a2a2a' },
          },
            /* ── En-tête cliquable ── */
            React.createElement(Box, {
              onClick: toggle,
              sx: {
                display: 'flex', alignItems: 'center', p: '12px 16px',
                cursor: 'pointer', userSelect: 'none',
                borderBottom: isOpen ? '1px solid #2a2a2a' : 'none',
                '&:hover': { background: 'rgba(126,217,177,0.05)' },
              },
            },
              React.createElement(Typography, {
                sx: { color: '#7ED9B1', fontWeight: 600, textTransform: 'capitalize', flexGrow: 1 },
              }, section),
              React.createElement(Typography, {
                sx: { color: '#555', mr: 1.5, fontSize: '0.8rem' },
              }, `${grouped[section].length} clé${grouped[section].length > 1 ? 's' : ''}`),
              React.createElement(ExpandMore, {
                sx: {
                  color: '#7ED9B1', fontSize: '1.2rem',
                  transform: isOpen ? 'rotate(180deg)' : 'rotate(0deg)',
                  transition: 'transform 200ms ease',
                },
              }),
            ),
            /* ── Contenu (affiché si ouvert) ── */
            isOpen && React.createElement(Box, { sx: { p: 2 } },
              /* Ligne d'en-tête colonnes */
              React.createElement(Box, {
                sx: { display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 1, mb: 1, px: 0.5 },
              },
                React.createElement(Typography, { sx: { fontSize: '0.75rem', color: '#444', fontFamily: 'monospace' } }, 'Clé'),
                React.createElement(Typography, { sx: { fontSize: '0.75rem', color: '#444' } }, 'FR'),
                React.createElement(Typography, { sx: { fontSize: '0.75rem', color: '#444' } }, 'EN'),
              ),
              /* Lignes de clés */
              ...grouped[section].map(key =>
                React.createElement(Box, {
                  key,
                  sx: { display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 1, mb: 1, alignItems: 'flex-start' },
                },
                  React.createElement(Typography, {
                    sx: { fontFamily: 'monospace', fontSize: '0.72rem', color: '#666', pt: 1, wordBreak: 'break-all' },
                  }, key.replace(`${section}.`, '')),
                  React.createElement(TextField, {
                    fullWidth:  true,
                    size:       'small',
                    multiline:  (flatFr[key] ?? '').length > 60,
                    rows:       (flatFr[key] ?? '').length > 60 ? 2 : 1,
                    value:      flatFr[key] ?? '',
                    onChange:   e => setFlatFr(prev => ({ ...prev, [key]: e.target.value })),
                    sx: { '& .MuiInputBase-root': { fontSize: '0.8rem' } },
                  }),
                  React.createElement(TextField, {
                    fullWidth:  true,
                    size:       'small',
                    multiline:  (flatEn[key] ?? '').length > 60,
                    rows:       (flatEn[key] ?? '').length > 60 ? 2 : 1,
                    value:      flatEn[key] ?? '',
                    onChange:   e => setFlatEn(prev => ({ ...prev, [key]: e.target.value })),
                    sx: { '& .MuiInputBase-root': { fontSize: '0.8rem' } },
                  }),
                )
              ),
            ),
          );
        }),

        /* Snackbar */
        React.createElement(Snackbar, {
          open: !!snack, autoHideDuration: 4000,
          onClose: () => setSnack(null),
          anchorOrigin: { vertical: 'bottom', horizontal: 'center' },
        },
          snack && React.createElement(Alert, { severity: snack.sev, variant: 'filled' }, snack.msg)
        ),
      );
    }

    /* ── CRUD TABLE ────────────────────────────────────────── */
    function CrudTable({ section }) {
      const [rows,              setRows]              = useState([]);
      const [rowsEn,            setRowsEn]            = useState([]);
      const [loading,           setLoading]           = useState(true);
      const [dialog,            setDialog]            = useState(null);
      const [form,              setForm]              = useState({});
      const [snack,             setSnack]             = useState(null);
      const [editCertifications, setEditCertifications] = useState([]);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          if (section.bilingual) {
            const [fr, en] = await Promise.all([
              apiFetch(section.endpoint + '?lang=fr'),
              apiFetch(section.endpoint + '?lang=en'),
            ]);
            setRows(fr ?? []);
            setRowsEn(en ?? []);
          } else {
            setRows(await apiFetch(section.endpoint));
          }
        } catch { setSnack({ msg: 'Failed to load data', sev: 'error' }); }
        finally { setLoading(false); }
      }, [section]);

      useEffect(() => { load(); }, [load]);

      const openCreate = () => {
        setEditCertifications([]);
        setForm({});
        setDialog('create');
      };
      const openEdit   = row  => {
        const base = { ...row, skill_ids: (row.skills ?? []).map(s => s.id) };
        if (section.bilingual) {
          const en = rowsEn.find(r => r.id === row.id) ?? {};
          /* type_key = clé enum depuis l'API (ex: 'work_study') */
          base.type           = row.type_key   ?? '';
          /* labels traduits pour affichage / envoi */
          base.type_fr        = row.type       ?? '';   // label FR (row vient de ?lang=fr)
          base.type_en        = en.type        ?? '';   // label EN
          base.role_en        = en.role        ?? '';
          base.description_en = en.description ?? '';
          /* Fallback : dériver les labels depuis EXP_TYPE_MAP si absents */
          if (base.type) {
            const match = EXP_TYPE_MAP.find(e => e.key === base.type);
            if (match) {
              if (!base.type_fr) base.type_fr = match.fr;
              if (!base.type_en) base.type_en = match.en;
            }
          }
        }
        /* Charger les certifications si c'est une formation */
        if (section.id === 'formations' && row.id) {
          apiFetch(`certifications.php?formation_id=${row.id}`)
            .then(certs => setEditCertifications((certs ?? []).map(c => ({ ...c, _status: 'existing' }))))
            .catch(() => setEditCertifications([]));
        } else {
          setEditCertifications([]);
        }
        setForm(base);
        setDialog('edit');
      };
      const closeDialog= ()   => { setDialog(null); setForm({}); setEditCertifications([]); };

      const save = async () => {
        try {
          let formationId = form.id;
          if (dialog === 'create') {
            const created = await apiFetch(section.endpoint, { method: 'POST', body: JSON.stringify(form) });
            formationId = created?.id;
          } else {
            await apiFetch(section.endpoint, { method: 'PUT', body: JSON.stringify(form) });
          }

          /* Gérer les certifications pour la section formations */
          if (section.id === 'formations') {
            const certOps = editCertifications.flatMap(c => {
              if (c._status === 'deleted' && c.id) {
                return [apiFetch(`certifications.php?id=${c.id}`, { method: 'DELETE' })];
              }
              if (c._status === 'new') {
                const payload = { name: c.name, year: c.year || null, formation_id: formationId };
                return [apiFetch('certifications.php', { method: 'POST', body: JSON.stringify(payload) })];
              }
              if (c._status === 'modified' && c.id) {
                const payload = { name: c.name, year: c.year || null };
                return [apiFetch(`certifications.php?id=${c.id}`, { method: 'PUT', body: JSON.stringify(payload) })];
              }
              return [];
            });
            await Promise.all(certOps);
          }

          setSnack({ msg: 'Saved successfully', sev: 'success' });
          closeDialog();
          load();
        } catch { setSnack({ msg: 'Save failed', sev: 'error' }); }
      };

      const remove = async id => {
        if (!window.confirm('Delete this entry?')) return;
        try {
          await apiFetch(`${section.endpoint}?id=${id}`, { method: 'DELETE' });
          setSnack({ msg: 'Deleted', sev: 'info' });
          load();
        } catch { setSnack({ msg: 'Delete failed', sev: 'error' }); }
      };

      const toggleFavorite = async (id, current) => {
        try {
          await apiFetch(section.endpoint, {
            method: 'PATCH',
            body: JSON.stringify({ id, is_favorite: current ? 0 : 1 }),
          });
          setRows(prev => prev.map(r => r.id === id ? { ...r, is_favorite: current ? 0 : 1 } : r));
        } catch { setSnack({ msg: 'Update failed', sev: 'error' }); }
      };

      if (loading) return React.createElement(Box, { sx: { p: 4, textAlign: 'center' } },
        React.createElement(CircularProgress, { color: 'primary' }));

      return React.createElement(Box, null,
        React.createElement(Box, { sx: { mb: 2, display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          React.createElement(Typography, { variant: 'h6' }, section.label),
          !section.readonly && React.createElement(Button, {
            variant: 'contained', size: 'small', onClick: openCreate,
          }, '+ New'),
        ),
        React.createElement(TableContainer, { component: Paper },
          React.createElement(Table, { size: 'small' },
            React.createElement(TableHead, null,
              React.createElement(TableRow, null,
                ...section.columns.map(c =>
                  c === 'is_favorite'
                    ? React.createElement(TableCell, { key: c, sx: { color: '#FFD700', width: 48, px: 1 } },
                        React.createElement(Star, { fontSize: 'small' })
                      )
                    : React.createElement(TableCell, { key: c, sx: { color: '#7ED9B1', fontWeight: 700 } },
                        c.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())
                      )
                ),
                !section.readonly && React.createElement(TableCell, { align: 'right' }, 'Actions'),
              )
            ),
            React.createElement(TableBody, null,
              rows.map((row, i) =>
                React.createElement(TableRow, { key: row.id ?? i, hover: true },
                  ...section.columns.map(c => {
                    if (c === 'is_favorite') {
                      return React.createElement(TableCell, { key: c, sx: { width: 48, px: 1 } },
                        React.createElement(IconButton, {
                          size: 'small',
                          onClick: e => { e.stopPropagation(); toggleFavorite(row.id, row.is_favorite); },
                          sx: { color: row.is_favorite ? '#FFD700' : '#555' },
                        },
                          row.is_favorite
                            ? React.createElement(Star,       { fontSize: 'small' })
                            : React.createElement(StarBorder, { fontSize: 'small' })
                        )
                      );
                    }
                    if (c === 'skills') {
                      const byCategory = (row.skills ?? []).reduce((acc, s) => {
                        (acc[s.category] ??= []).push(s);
                        return acc;
                      }, {});
                      return React.createElement(TableCell, { key: c, sx: { fontSize: '0.8rem', maxWidth: 300, verticalAlign: 'top' } },
                        Object.keys(byCategory).length === 0 ? '—' :
                        React.createElement(Box, { sx: { display: 'flex', flexDirection: 'column', gap: 0.5, py: 0.5 } },
                          ...Object.entries(byCategory).map(([cat, items]) =>
                            React.createElement(Box, { key: cat, sx: { display: 'flex', gap: 0.5, flexWrap: 'wrap', alignItems: 'center' } },
                              React.createElement(Typography, { variant: 'caption', sx: { color: '#7ED9B1', fontWeight: 700, fontSize: '0.65rem', whiteSpace: 'nowrap' } }, cat + ':'),
                              ...items.map(s =>
                                React.createElement(Chip, { key: s.id, label: s.name, size: 'small', sx: { fontSize: '0.65rem', height: 18 } })
                              )
                            )
                          )
                        )
                      );
                    }
                    if (c === 'certifications') {
                      const certs = row.certifications ?? [];
                      return React.createElement(TableCell, { key: c, sx: { fontSize: '0.8rem', maxWidth: 220, verticalAlign: 'top' } },
                        certs.length === 0 ? '—' :
                        React.createElement(Box, { sx: { display: 'flex', flexDirection: 'column', gap: 0.4, py: 0.5 } },
                          ...certs.map(cert =>
                            React.createElement(Typography, { key: cert.id, variant: 'caption', sx: { display: 'block', fontSize: '0.72rem', color: '#ccc' } },
                              (cert.year ? cert.year + ' — ' : '') + cert.name
                            )
                          )
                        )
                      );
                    }
                    return React.createElement(TableCell, { key: c, sx: { fontSize: '0.8rem', maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } },
                      String(row[c] ?? '—')
                    );
                  }),
                  !section.readonly && React.createElement(TableCell, { align: 'right' },
                    React.createElement(Button, { size: 'small', onClick: () => openEdit(row), sx: { mr: 1 } }, 'Edit'),
                    React.createElement(Button, { size: 'small', color: 'error', onClick: () => remove(row.id) }, 'Delete'),
                  ),
                )
              )
            )
          )
        ),

        /* Dialog */
        !section.readonly && React.createElement(Dialog, { open: !!dialog, onClose: closeDialog, maxWidth: 'sm', fullWidth: true },
          React.createElement(DialogTitle, null, dialog === 'create' ? 'New entry' : 'Edit entry'),
          React.createElement(DialogContent, { sx: { display: 'flex', flexDirection: 'column', gap: 2, pt: 2 } },
            ...section.fields.map(f => {
              if (f.type === 'skills') {
                return React.createElement(SkillsPicker, {
                  key:      f.key,
                  value:    form[f.key] ?? [],
                  onChange: ids => setForm(prev => ({ ...prev, [f.key]: ids })),
                });
              }
              return React.createElement(AutoField, { key: f.key, fieldDef: f, form, setForm, rows });
            }),

            /* Sous-section Certifications (formations uniquement) */
            section.id === 'formations' && React.createElement(Box, { key: '__certs', sx: { mt: 1 } },
              React.createElement(Divider, { sx: { mb: 1.5 } }),
              React.createElement(Typography, { variant: 'subtitle2', sx: { mb: 1, color: '#7ED9B1' } }, 'Certifications'),
              ...editCertifications
                .filter(c => c._status !== 'deleted')
                .map((c, idx) => {
                  const realIdx = editCertifications.indexOf(c);
                  return React.createElement(Box, { key: c.id ?? `new-${idx}`, sx: { display: 'flex', gap: 1, alignItems: 'center', mb: 1 } },
                    React.createElement(TextField, {
                      label:    'Année',
                      size:     'small',
                      type:     'number',
                      value:    c.year ?? '',
                      onChange: e => setEditCertifications(prev => prev.map((x, i) =>
                        i === realIdx ? { ...x, year: e.target.value ? parseInt(e.target.value, 10) : null, _status: x._status === 'new' ? 'new' : 'modified' } : x
                      )),
                      sx: { width: 100 },
                    }),
                    React.createElement(TextField, {
                      label:    'Nom',
                      size:     'small',
                      value:    c.name ?? '',
                      onChange: e => setEditCertifications(prev => prev.map((x, i) =>
                        i === realIdx ? { ...x, name: e.target.value, _status: x._status === 'new' ? 'new' : 'modified' } : x
                      )),
                      sx: { flex: 1 },
                    }),
                    React.createElement(IconButton, {
                      size:    'small',
                      color:   'error',
                      onClick: () => setEditCertifications(prev => prev.map((x, i) =>
                        i === realIdx
                          ? (x._status === 'new' ? null : { ...x, _status: 'deleted' })
                          : x
                      ).filter(Boolean)),
                    }, React.createElement(Delete, { fontSize: 'small' }))
                  );
                }),
              React.createElement(Button, {
                size:    'small',
                variant: 'outlined',
                onClick: () => setEditCertifications(prev => [...prev, { name: '', year: null, _status: 'new' }]),
                sx:      { mt: 0.5 },
              }, '+ Ajouter une certification')
            ),
          ),
          React.createElement(DialogActions, null,
            React.createElement(Button, { onClick: closeDialog }, 'Cancel'),
            React.createElement(Button, { variant: 'contained', onClick: save }, 'Save'),
          )
        ),

        /* Snackbar */
        React.createElement(Snackbar, {
          open: !!snack, autoHideDuration: 3000,
          onClose: () => setSnack(null),
          anchorOrigin: { vertical: 'bottom', horizontal: 'center' },
        },
          snack && React.createElement(Alert, { severity: snack.sev, variant: 'filled' }, snack.msg)
        ),
      );
    }

    /* ── ADMIN APP ─────────────────────────────────────────── */
    const PROFILE_NAV      = { id: 'profile',      label: 'Profil' };
    const CV_NAV           = { id: 'cv',           label: 'CV' };
    const I18N_NAV         = { id: 'translations', label: 'Traductions' };
    const ALL_NAV          = [...SECTIONS, PROFILE_NAV, CV_NAV, I18N_NAV];

    function AdminApp() {
      const [active, setActive] = useState('experiences');
      const [ready,  setReady]  = useState(false);
      const section = SECTIONS.find(s => s.id === active);

      useEffect(() => {
        fetch(`${API}/auth.php?action=check`)
          .then(r => r.json())
          .then(data => {
            if (data.authenticated) { setReady(true); }
            else { window.location.replace('login.html'); }
          })
          .catch(() => { window.location.replace('login.html'); });
      }, []);

      const logout = async () => {
        await fetch(`${API}/auth.php?action=logout`, { method: 'POST' });
        window.location.replace('login.html');
      };

      if (!ready) return React.createElement(
        Box, { display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' },
        React.createElement(CircularProgress, { color: 'primary' })
      );

      return React.createElement(ThemeProvider, { theme },
        React.createElement(CssBaseline, null),
        React.createElement(Box, { sx: { display: 'flex' } },

          /* Sidebar */
          React.createElement(Drawer, {
            variant: 'permanent',
            sx: {
              width: DRAWER_WIDTH,
              '& .MuiDrawer-paper': {
                width: DRAWER_WIDTH, boxSizing: 'border-box',
                background: '#0a0a0a', borderRight: '1px solid #222',
              },
            },
          },
            React.createElement(Toolbar, null,
              React.createElement(Typography, { variant: 'subtitle2', color: 'primary', fontWeight: 700 }, 'Admin Panel')
            ),
            React.createElement(List, null,
              ALL_NAV.map(s =>
                React.createElement(ListItem, { key: s.id, disablePadding: true },
                  React.createElement(ListItemButton, {
                    selected: active === s.id,
                    onClick:  () => setActive(s.id),
                    sx: { '&.Mui-selected': { color: '#7ED9B1', background: 'rgba(126,217,177,0.08)' } },
                  },
                    React.createElement(ListItemText, { primary: s.label, primaryTypographyProps: { fontSize: '0.875rem' } })
                  )
                )
              )
            )
          ),

          /* Main */
          React.createElement(Box, { component: 'main', sx: { flexGrow: 1, p: 3 } },
            React.createElement(AppBar, { position: 'static', color: 'transparent', elevation: 0, sx: { mb: 3, borderBottom: '1px solid #222' } },
              React.createElement(Toolbar, null,
                React.createElement(Typography, { variant: 'h6', sx: { flexGrow: 1 } }, 'Portefolio Admin'),
                React.createElement(Button, { href: '../index.html', size: 'small', color: 'primary', sx: { mr: 1 } }, 'View site →'),
                React.createElement(Button, { onClick: logout, size: 'small', color: 'inherit', variant: 'outlined', sx: { borderColor: '#444' } }, 'Déconnexion'),
              )
            ),
            active === 'profile'
              ? React.createElement(ProfileForm,         { key: 'profile' })
              : active === 'cv'
              ? React.createElement(CvSection,           { key: 'cv' })
              : active === 'translations'
              ? React.createElement(TranslationsEditor,  { key: 'translations' })
              : section && React.createElement(CrudTable, { key: active, section }),
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(AdminApp));
  </script>
</body>
</html>
