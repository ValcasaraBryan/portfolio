<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changer le mot de passe — Admin Portfolio</title>
  <link rel="icon" id="site-favicon" href="" type="image/png">
  <script>
    fetch('../api/profile.php').then(r => r.json()).then(p => {
      if (p.favicon_url) document.getElementById('site-favicon').href = p.favicon_url;
    }).catch(() => {});
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@18.2.0",
      "react/jsx-runtime":  "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client":   "https://esm.sh/react-dom@18.2.0/client",
      "@emotion/react":     "https://esm.sh/@emotion/react@11.11.0?deps=react@18.2.0",
      "@emotion/styled":    "https://esm.sh/@emotion/styled@11.11.0?deps=react@18.2.0,@emotion/react@11.11.0",
      "@mui/material":      "https://esm.sh/@mui/material@5.15.0?deps=react@18.2.0,react-dom@18.2.0,@emotion/react@11.11.0,@emotion/styled@11.11.0"
    }
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #111; color: #fff; }
    #root { display: flex; min-height: 100vh; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Box, Card, CardContent, Typography, TextField,
      Button, Alert, CircularProgress, LinearProgress,
      createTheme, ThemeProvider, CssBaseline,
    } from '@mui/material';

    const API = '../api';

    const theme = createTheme({
      palette: {
        mode: 'dark',
        primary:    { main: '#7ED9B1' },
        background: { default: '#111', paper: '#1a1a1a' },
      },
      typography: { fontFamily: "'Inter', sans-serif" },
    });

    function passwordStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8)  score++;
      if (pwd.length >= 12) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      return score;
    }

    const STRENGTH_LABEL = ['', 'Très faible', 'Faible', 'Moyen', 'Fort', 'Très fort'];
    const STRENGTH_COLOR = ['', 'error', 'error', 'warning', 'success', 'success'];

    function ChangePasswordPage() {
      const [password,  setPassword]  = useState('');
      const [confirm,   setConfirm]   = useState('');
      const [error,     setError]     = useState('');
      const [loading,   setLoading]   = useState(true);
      const [submitting,setSubmitting]= useState(false);

      useEffect(() => {
        fetch(`${API}/auth.php?action=check`)
          .then(r => r.json())
          .then(data => {
            if (!data.authenticated) { window.location.replace('login.html'); }
            else { setLoading(false); }
          })
          .catch(() => { window.location.replace('login.html'); });
      }, []);

      const strength = passwordStrength(password);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (password !== confirm) { setError('Les mots de passe ne correspondent pas.'); return; }
        if (password.length < 8)  { setError('Minimum 8 caractères requis.'); return; }
        setSubmitting(true);
        try {
          const res = await fetch(`${API}/auth.php?action=change_password`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ password }),
          });
          const data = await res.json();
          if (res.ok) { window.location.replace('index.html'); }
          else { setError(data.error ?? 'Erreur lors du changement.'); }
        } catch {
          setError('Erreur réseau, réessayez.');
        } finally {
          setSubmitting(false);
        }
      };

      if (loading) {
        return React.createElement(
          Box, { display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' },
          React.createElement(CircularProgress, { color: 'primary' })
        );
      }

      return React.createElement(
        Box, { display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', px: 2 },
        React.createElement(
          Card, { sx: { width: '100%', maxWidth: 420, p: 1 } },
          React.createElement(
            CardContent, null,
            React.createElement(
              Box, { textAlign: 'center', mb: 3 },
              React.createElement(Typography, { variant: 'h6', fontWeight: 700, color: 'primary' }, 'Première connexion'),
              React.createElement(Typography, { variant: 'body2', color: 'text.secondary', mt: 1 },
                'Pour des raisons de sécurité, vous devez définir un nouveau mot de passe avant de continuer.'
              )
            ),
            React.createElement(
              'form', { onSubmit: handleSubmit },
              React.createElement(TextField, {
                label: 'Nouveau mot de passe',
                type: 'password',
                value: password,
                onChange: e => setPassword(e.target.value),
                fullWidth: true,
                required: true,
                autoFocus: true,
                autoComplete: 'new-password',
                sx: { mb: 1 },
              }),
              password.length > 0 && React.createElement(
                Box, { sx: { mb: 2 } },
                React.createElement(LinearProgress, {
                  variant: 'determinate',
                  value: (strength / 5) * 100,
                  color: STRENGTH_COLOR[strength],
                  sx: { height: 4, borderRadius: 2, mb: 0.5 },
                }),
                React.createElement(Typography, { variant: 'caption', color: `${STRENGTH_COLOR[strength]}.main` },
                  STRENGTH_LABEL[strength]
                )
              ),
              React.createElement(TextField, {
                label: 'Confirmer le mot de passe',
                type: 'password',
                value: confirm,
                onChange: e => setConfirm(e.target.value),
                fullWidth: true,
                required: true,
                autoComplete: 'new-password',
                sx: { mb: error ? 2 : 3 },
                error: confirm.length > 0 && password !== confirm,
                helperText: confirm.length > 0 && password !== confirm ? 'Les mots de passe ne correspondent pas' : '',
              }),
              error && React.createElement(Alert, { severity: 'error', sx: { mb: 2 } }, error),
              React.createElement(
                Button, {
                  type: 'submit',
                  variant: 'contained',
                  fullWidth: true,
                  size: 'large',
                  disabled: submitting || strength < 2,
                },
                submitting
                  ? React.createElement(CircularProgress, { size: 22, color: 'inherit' })
                  : 'Définir le mot de passe'
              )
            )
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(
      React.createElement(ThemeProvider, { theme },
        React.createElement(CssBaseline),
        React.createElement(ChangePasswordPage)
      )
    );
  </script>
</body>
</html>
