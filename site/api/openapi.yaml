          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/{id}:
    put:
      tags:
      - users
      summary: Mettre à jour un utilisateur admin (superadmin)
      description: 'Si `password` est fourni (≥ 8 chars), il est re-hashé et `must_change_password` est remis à 0.

        Protections : impossible de rétrograder/supprimer le dernier superadmin.'
      operationId: v2UsersUpdate
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum:
                  - superadmin
                  - admin
                  - editor
                permissions:
                  type: object
                  nullable: true
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Mot de passe invalide ou impossible de rétrograder le dernier superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - users
      summary: Supprimer un utilisateur admin (superadmin)
      description: 'Protections : impossible de se supprimer soi-même ou de supprimer le dernier superadmin.'
      operationId: v2UsersDelete
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Utilisateur supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Impossible de supprimer soi-même ou le dernier superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/{id}/permissions:
    patch:
      tags:
      - users
      summary: Mettre à jour les permissions d'un utilisateur (superadmin)
      operationId: v2UsersUpdatePermissions
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - permissions
              properties:
                permissions:
                  type: object
                  description: 'Objet de permissions granulaires. Structure : { "skills": { "read": true, "write": true, "delete":
                    false } }'
      responses:
        '200':
          description: Permissions mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Champ `permissions` manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
