openapi: 3.0.0
info:
  title: Portfolio API
  version: 2.0.0
  description: 'REST API v2 du portfolio de Bryan Valcasara.


    Authentification via JWT Bearer — se connecter via `POST /api/v2/auth/login`.

    Inclure `Authorization: Bearer <token>` dans chaque requête protégée.


    ## Localisation

    Les endpoints GET publics acceptent `?lang=fr` ou `?lang=en` (défaut : `fr`).


    ## Codes d''erreur communs

    - `400` — Paramètres manquants ou invalides

    - `401` — Non authentifié

    - `403` — Droits insuffisants

    - `422` — Données métier invalides

    - `429` — Trop de tentatives (rate limiting)

    '
servers:
- url: /
  description: Racine du site (les chemins incluent /api/v2/)
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenu via `POST /api/v2/auth/login`. Expire après 1 heure.
    SessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: Cookie de session PHP. Utilisé uniquement pour `auth/exchange`.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials
    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: s3cr3t
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token (expiration 1 heure)
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/AdminUser'
    RefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    RefreshResponse:
      type: object
      properties:
        token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - superadmin
          - admin
          - editor
        permissions:
          type: object
          nullable: true
          description: 'Permissions granulaires (null = droits du rôle par défaut). Structure : { "feature": { "read": true,
            "write": true, "delete": false } }'
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    AdminUserWriteRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - superadmin
          - admin
          - editor
          default: editor
        permissions:
          type: object
          nullable: true
    Skill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        category_description:
          type: string
          nullable: true
        category_color:
          type: string
          example: '#7ED9B1'
        skill_description:
          type: string
          nullable: true
    SkillWriteRequest:
      type: object
      required:
      - name_fr
      - name_en
      - category_key
      properties:
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
        description_en:
          type: string
        category_key:
          type: string
          description: Clé canonique de la catégorie (ex. "frontend", "backend")
    SkillRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    SkillSyncRequest:
      type: object
      required:
      - skill_ids
      properties:
        skill_ids:
          type: array
          items:
            type: integer
          example:
          - 1
          - 3
          - 7
    Category:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
          description: Clé canonique (immuable après création)
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        color:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
          example: '#7ED9B1'
        sort_order:
          type: integer
    CategoryWriteRequest:
      type: object
      required:
      - key
      properties:
        key:
          type: string
          description: Clé canonique anglaise (immuable après création)
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
        description_en:
          type: string
        color:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
          default: '#888888'
        sort_order:
          type: integer
    Education:
      type: object
      properties:
        id:
          type: integer
        school:
          type: string
        city:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        mention:
          type: string
          nullable: true
        title:
          type: string
        level:
          type: string
        description:
          type: string
          nullable: true
    EducationWriteRequest:
      type: object
      required:
      - school
      - title
      - level
      - city
      - start_date
      properties:
        school:
          type: string
        title:
          type: string
        title_en:
          type: string
        level:
          type: string
        level_en:
          type: string
        city:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        description:
          type: string
        description_en:
          type: string
        mention:
          type: string
    ExperienceType:
      type: string
      enum:
      - internship
      - permanent_contract
      - fixed_term_contract
      - work_study
      - freelance
      - self_employed
    Experience:
      type: object
      properties:
        id:
          type: integer
        company:
          type: string
        location:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        type:
          $ref: '#/components/schemas/ExperienceType'
        role:
          type: string
        description:
          type: string
          nullable: true
    ExperienceWriteRequest:
      type: object
      required:
      - company
      - role_fr
      - type
      - start_date
      properties:
        company:
          type: string
        role_fr:
          type: string
        role_en:
          type: string
        type:
          $ref: '#/components/schemas/ExperienceType'
        location:
          type: string
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        description_fr:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
    CertificationFull:
      type: object
      properties:
        id:
          type: integer
        year:
          type: integer
          nullable: true
          example: 2024
        name:
          type: string
        formation_id:
          type: integer
          nullable: true
        formation_title:
          type: string
          nullable: true
    CertificationWriteRequest:
      type: object
      required:
      - name
      properties:
        year:
          type: integer
          nullable: true
        name:
          type: string
        formation_id:
          type: integer
          nullable: true
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        github_url:
          type: string
          format: uri
          nullable: true
        is_favorite:
          type: boolean
        category:
          type: string
          enum:
          - web
          - opensource
          - side
          nullable: true
    ProjectWriteRequest:
      type: object
      required:
      - name_fr
      properties:
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        github_url:
          type: string
          format: uri
          nullable: true
        category:
          type: string
          enum:
          - web
          - opensource
          - side
          nullable: true
        is_favorite:
          type: integer
          enum:
          - 0
          - 1
          default: 0
tags:
- name: auth-v2
  description: '**V2** — Authentification JWT Bearer. Refresh token rotation inclus.'
- name: experiences
  description: Expériences professionnelles
- name: projects
  description: Projets du portfolio
- name: certifications
  description: Certifications attachées aux formations
- name: educations
  description: Formations / éducation (V2)
- name: skills
  description: Compétences techniques
- name: categories
  description: Catégories de compétences
- name: users
  description: Gestion des utilisateurs admin (superadmin uniquement)
paths:
  /api/v2/auth/login:
    post:
      tags:
      - auth-v2
      summary: Connexion (JWT)
      description: 'Retourne un access token (JWT, 1h) et un refresh token (7 jours).

        Rate-limitée à **5 tentatives échouées** par IP par 15 minutes.'
      operationId: v2AuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Champs manquants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Identifiants incorrects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Trop de tentatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/auth/logout:
    post:
      tags:
      - auth-v2
      summary: Déconnexion (révocation JWT)
      description: Révoque le JTI du token courant dans la table `jwt_revoked_tokens`.
      operationId: v2AuthLogout
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Token révoqué
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/auth/refresh:
    post:
      tags:
      - auth-v2
      summary: Rafraîchissement du token
      description: Échange un refresh token valide contre un nouveau couple access token / refresh token (rotation).
      operationId: v2AuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Nouveau token émis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '400':
          description: refresh_token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Refresh token invalide, expiré ou révoqué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/auth/me:
    get:
      tags:
      - auth-v2
      summary: Profil de l'utilisateur courant
      operationId: v2AuthMe
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Données de l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Utilisateur introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/auth/exchange:
    get:
      tags:
      - auth-v2
      summary: Échange session PHP → JWT (superadmin)
      description: Permet à un superadmin connecté via la session PHP V1 d'obtenir un JWT V2.
      operationId: v2AuthExchange
      security:
      - SessionCookie: []
      responses:
        '200':
          description: JWT émis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Session PHP inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Rôle insuffisant (superadmin requis)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/skills:
    get:
      tags:
      - skills
      summary: Liste des compétences (public)
      operationId: v2SkillsList
      parameters:
      - name: lang
        in: query
        schema:
          type: string
          enum:
          - fr
          - en
          default: fr
      responses:
        '200':
          description: Liste des compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
    post:
      tags:
      - skills
      summary: Créer une compétence
      operationId: v2SkillsCreate
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillWriteRequest'
      responses:
        '201':
          description: Compétence créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Permission `skills.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/skills/{id}:
    put:
      tags:
      - skills
      summary: Mettre à jour une compétence
      operationId: v2SkillsUpdate
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillWriteRequest'
      responses:
        '200':
          description: Compétence mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission `skills.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - skills
      summary: Supprimer une compétence
      operationId: v2SkillsDelete
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Opération réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission `skills.delete` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/categories:
    get:
      tags:
      - categories
      summary: Liste des catégories (public)
      operationId: v2CategoriesList
      responses:
        '200':
          description: Liste des catégories de compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags:
      - categories
      summary: Créer une catégorie
      operationId: v2CategoriesCreate
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        '201':
          description: Catégorie créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Permission `categories.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/categories/{id}:
    put:
      tags:
      - categories
      summary: Mettre à jour une catégorie
      description: La clé (`key`) est immuable et ignorée si fournie.
      operationId: v2CategoriesUpdate
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        '200':
          description: Catégorie mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - categories
      summary: Supprimer une catégorie
      operationId: v2CategoriesDelete
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Opération réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission `categories.delete` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/categories/{id}/skills:
    get:
      tags:
      - categories
      summary: Skills d'une catégorie (public)
      operationId: v2CategoriesSkillsList
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: lang
        in: query
        schema:
          type: string
          enum:
          - fr
          - en
          default: fr
      responses:
        '200':
          description: Liste des compétences de la catégorie
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillRef'
  /api/v2/educations:
    get:
      tags:
      - educations
      summary: Liste des formations (public)
      operationId: v2EducationsList
      parameters:
      - name: lang
        in: query
        schema:
          type: string
          enum:
          - fr
          - en
          default: fr
      responses:
        '200':
          description: Liste des formations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Education'
    post:
      tags:
      - educations
      summary: Créer une formation
      operationId: v2EducationsCreate
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationWriteRequest'
      responses:
        '201':
          description: Formation créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '403':
          description: Permission `educations.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/educations/{id}:
    put:
      tags:
      - educations
      summary: Mettre à jour une formation
      operationId: v2EducationsUpdate
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationWriteRequest'
      responses:
        '200':
          description: Formation mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - educations
      summary: Supprimer une formation
      operationId: v2EducationsDelete
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Opération réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Permission `educations.delete` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/educations/{id}/skills:
    get:
      tags:
      - educations
      summary: Skills liés (V2, public)
      operationId: v2EducationsSkillsList
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: lang
        in: query
        schema:
          type: string
          enum:
          - fr
          - en
          default: fr
      responses:
        '200':
          description: Liste des compétences associées
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillRef'
    put:
      tags:
      - educations
      summary: Synchroniser les skills (V2)
      description: Remplace la liste complète des skills associés (DELETE + INSERT).
      operationId: v2EducationsSkillsSync
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillSyncRequest'
      responses:
        '200':
          description: Association mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission `educations.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: skill_ids manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/experiences:
    get:
      tags:
      - experiences
