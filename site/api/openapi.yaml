          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Certification supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — CONTACT
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/contact.php:
    get:
      tags: [contact]
      summary: Liste des messages de contact (admin V1)
      operationId: v1ContactList
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Messages reçus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactMessage'
    post:
      tags: [contact]
      summary: Soumettre le formulaire de contact (public, CAPTCHA requis)
      operationId: v1ContactSubmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message, altcha]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 255
                message:
                  type: string
                altcha:
                  type: string
                  description: Solution Altcha CAPTCHA (obtenue via `GET /api/altcha.php`)
      responses:
        "201":
          description: Message envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Données invalides ou CAPTCHA échoué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [contact]
      summary: Supprimer un message de contact (admin V1)
      operationId: v1ContactDelete
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — LIENS SOCIAUX
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/links.php:
    get:
      tags: [links]
      summary: Liste des liens sociaux (public)
      operationId: v1LinksList
      responses:
        "200":
          description: Liens sociaux
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Link'
    post:
      tags: [links]
      summary: Créer un lien social (admin V1)
      operationId: v1LinksCreate
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, url]
              properties:
                platform:
                  type: string
                url:
                  type: string
                  format: uri
                icon:
                  type: string
                icon_dark:
                  type: string
      responses:
        "201":
          description: Lien créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: integer
    put:
      tags: [links]
      summary: Mettre à jour un lien social (admin V1)
      operationId: v1LinksUpdate
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, platform, url]
              properties:
                id:
                  type: integer
                platform:
                  type: string
                url:
                  type: string
                  format: uri
                icon:
                  type: string
                icon_dark:
                  type: string
      responses:
        "200":
          description: Lien mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    delete:
      tags: [links]
      summary: Supprimer un lien social (admin V1)
      operationId: v1LinksDelete
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lien supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — CV
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/cv.php:
    get:
      tags: [cv]
      summary: Métadonnées du CV (public)
      operationId: v1CvGet
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      responses:
        "200":
          description: Informations sur le CV
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CvMetadata'
    post:
      tags: [cv]
      summary: Uploader un CV PDF (admin V1)
      description: Upload multipart. Fichier PDF uniquement, max 5 Mo.
      operationId: v1CvUpload
      security:
        - SessionCookie: []
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [cv]
              properties:
                cv:
                  type: string
                  format: binary
                  description: Fichier PDF (max 5 Mo)
      responses:
        "200":
          description: CV uploadé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  url:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
    patch:
      tags: [cv]
      summary: Mettre à jour les métadonnées du CV (admin V1)
      operationId: v1CvPatch
      security:
        - SessionCookie: []
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                download_name:
                  type: string
                  description: "Nom du fichier lors du téléchargement (pattern : lettres, chiffres, tirets, underscores + .pdf)"
                  example: CV_Bryan_Valcasara.pdf
                external_url:
                  type: string
                  format: uri
                  description: URL externe du CV (prend le dessus sur le fichier uploadé)
      responses:
        "200":
          description: Métadonnées mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    delete:
      tags: [cv]
      summary: Supprimer le CV (admin V1)
      operationId: v1CvDelete
      security:
        - SessionCookie: []
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      responses:
        "200":
          description: CV supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — I18N
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/i18n.php:
    get:
      tags: [i18n]
      summary: Récupérer les traductions de l'interface (public)
      operationId: v1I18nGet
      responses:
        "200":
          description: Clés de traduction FR + EN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/I18nBundle'
    put:
      tags: [i18n]
      summary: Mettre à jour les traductions (admin V1)
      operationId: v1I18nUpdate
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/I18nBundle'
      responses:
        "200":
          description: Traductions mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — UPLOAD
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/upload.php:
    post:
      tags: [upload]
      summary: Uploader une image (admin V1)
      description: |
        Formats acceptés : JPEG, PNG, WebP, GIF, SVG, ICO. Taille max : 2 Mo.
        Les images sont optimisées et converties en WebP si possible.
        Le fichier reçoit un nom UUID normalisé (jamais le nom original du client).
      operationId: v1UploadImage
      security:
        - SessionCookie: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [project, link, profile]
          description: Détermine le sous-dossier de stockage dans `/uploads/`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Fichier image (max 2 Mo)
      responses:
        "200":
          description: Image uploadée
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  url:
                    type: string
                    example: "/uploads/project/a1b2c3d4.webp"
        "400":
          description: Type MIME invalide, fichier trop lourd ou type de dossier inconnu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — TAB ROUTES
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/tab_routes.php:
    get:
      tags: [utils]
      summary: Récupérer la configuration des onglets (public)
      operationId: v1TabRoutesGet
      responses:
        "200":
          description: Routes et configuration des onglets
          content:
            application/json:
              schema:
                type: object
                properties:
                  routes:
                    type: array
                    items:
                      $ref: '#/components/schemas/TabRoute'
                  config:
                    type: object
                    properties:
                      default_tab:
                        type: string
                      home_tab:
                        type: string
    put:
      tags: [utils]
      summary: Mettre à jour la configuration des onglets (admin V1)
      operationId: v1TabRoutesUpdate
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                routes:
                  type: array
                  items:
                    $ref: '#/components/schemas/TabRoute'
                config:
                  type: object
                  properties:
                    default_tab:
                      type: string
                    home_tab:
                      type: string
      responses:
        "200":
          description: Configuration mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ═══════════════════════════════════════════════════════════════════════════════
  # UTILITAIRES
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/altcha.php:
    get:
      tags: [utils]
      summary: Générer un challenge CAPTCHA Altcha (public)
      description: |
        Retourne un challenge Altcha signé via HMAC. À utiliser avec la librairie
        Altcha côté client pour générer la solution à soumettre dans le formulaire de contact.
      operationId: v1AltchaChallenge
      responses:
        "200":
          description: Challenge Altcha
          content:
            application/json:
              schema:
                type: object
                properties:
                  algorithm:
                    type: string
                    example: SHA-256
                  challenge:
                    type: string
                  maxnumber:
                    type: integer
                  salt:
                    type: string
                  signature:
                    type: string

  /api/check-url.php:
    get:
      tags: [utils]
      summary: Vérifier si une URL externe est accessible (public, cache 24h)
      operationId: v1CheckUrl
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Résultat de la vérification
          content:
            application/json:
              schema:
                type: object
                properties:
                  online:
                    type: boolean
