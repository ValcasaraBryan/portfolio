  # ═══════════════════════════════════════════════════════════════════════════════

  /api/v2/users:
    get:
      tags: [users]
      summary: Liste des utilisateurs admin (superadmin)
      operationId: v2UsersList
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
        "403":
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [users]
      summary: Créer un utilisateur admin (superadmin)
      operationId: v2UsersCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserWriteRequest'
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "403":
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Mot de passe trop court (< 8 caractères) ou username déjà pris
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/users/{id}:
    put:
      tags: [users]
      summary: Mettre à jour un utilisateur admin (superadmin)
      description: |
        Si `password` est fourni (≥ 8 chars), il est re-hashé et `must_change_password` est remis à 0.
        Protections : impossible de rétrograder/supprimer le dernier superadmin.
      operationId: v2UsersUpdate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [superadmin, admin, editor]
                permissions:
                  type: object
                  nullable: true
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "200":
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Mot de passe invalide ou impossible de rétrograder le dernier superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [users]
      summary: Supprimer un utilisateur admin (superadmin)
      description: |
        Protections : impossible de se supprimer soi-même ou de supprimer le dernier superadmin.
      operationId: v2UsersDelete
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Utilisateur supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Impossible de supprimer soi-même ou le dernier superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/users/{id}/permissions:
    patch:
      tags: [users]
      summary: Mettre à jour les permissions d'un utilisateur (superadmin)
      operationId: v2UsersUpdatePermissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissions]
              properties:
                permissions:
                  type: object
                  description: |
                    Objet de permissions granulaires.
                    Structure : `{ "skills": { "read": true, "write": true, "delete": false } }`
      responses:
        "200":
          description: Permissions mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Rôle superadmin requis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Champ `permissions` manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V1 — AUTH
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/auth.php:
    get:
      tags: [auth-v1]
      summary: Vérifier l'état d'authentification (V1)
      operationId: v1AuthCheck
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [check]
      responses:
        "200":
          description: État de la session
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
    post:
      tags: [auth-v1]
      summary: Actions d'authentification (V1)
      description: |
        Plusieurs actions selon le paramètre `action` :
        - **`login`** : connexion (username + password). Rate-limitée à 5 tentatives/15 min/IP.
          Retourne `{ ok: true, must_change_password: bool }`.
        - **`logout`** : déconnexion (session requise). Retourne `{ ok: true }`.
        - **`change_password`** : changement de mot de passe (session requise, min 8 chars).
          Retourne `{ ok: true }`.
      operationId: v1AuthAction
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [login, logout, change_password]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Requis pour `login`
                password:
                  type: string
                  format: password
                  description: Requis pour `login` et `change_password`
      responses:
        "200":
          description: Action réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  must_change_password:
                    type: boolean
                    description: Présent uniquement pour l'action `login`
        "401":
          description: Identifiants incorrects ou session invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "429":
          description: Trop de tentatives (login uniquement)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

