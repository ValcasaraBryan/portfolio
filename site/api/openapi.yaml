openapi: 3.0.0

info:
  title: Portfolio API
  version: "2.0.0"
  description: |
    REST API du portfolio de Bryan Valcasara.

    ## Deux versions d'API

    ### V1 — Session PHP (`/api/`)
    Utilisée par le panneau admin (`/admin/`). L'authentification se fait via
    `POST /api/auth.php?action=login` qui pose un cookie de session `PHPSESSID`.

    ### V2 — JWT Bearer (`/api/v2/`)
    Nouvelle API RESTful avec authentification par JWT. Se connecter via
    `POST /api/v2/auth/login` pour obtenir un token Bearer.
    Inclure `Authorization: Bearer <token>` dans chaque requête protégée.

    ## Localisation
    La plupart des endpoints GET publics acceptent `?lang=fr` ou `?lang=en` (défaut : `fr`).

    ## Codes d'erreur communs
    - `400` — Paramètres manquants ou invalides
    - `401` — Non authentifié
    - `403` — Droits insuffisants
    - `422` — Données métier invalides
    - `429` — Trop de tentatives (rate limiting)

servers:
  - url: /
    description: Racine du site (les chemins incluent /api/ ou /api/v2/)

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: Cookie de session PHP. Posé automatiquement après `POST /api/auth.php?action=login`.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenu via `POST /api/v2/auth/login`. Expire après 1 heure.

  schemas:

    # ─── Utilitaires ────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid credentials"

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true

    # ─── Auth V2 ────────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: "s3cr3t_p4ss"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token (expiration 1 heure)
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/AdminUser'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [superadmin, admin, editor]
        permissions:
          type: object
          nullable: true
          description: |
            Permissions granulaires (null = utilise les droits du rôle par défaut).
            Structure : `{ "feature": { "read": true, "write": true, "delete": false } }`
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AdminUserWriteRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        email:
          type: string
          format: email
        role:
          type: string
          enum: [superadmin, admin, editor]
          default: editor
        permissions:
          type: object
          nullable: true

    # ─── Skills ─────────────────────────────────────────────────────────────────

    Skill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        category_description:
          type: string
          nullable: true
        category_color:
          type: string
          example: "#7ED9B1"
        skill_description:
          type: string
          nullable: true

    SkillWriteRequest:
      type: object
      required: [name_fr, name_en, category_key]
      properties:
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
        description_en:
          type: string
        category_key:
          type: string
          description: Clé canonique de la catégorie (ex. "frontend", "backend")

    # ─── Skill Categories ───────────────────────────────────────────────────────

    Category:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
          description: Clé canonique (immuable après création)
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: "#7ED9B1"
        sort_order:
          type: integer

    CategoryWriteRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: Clé canonique anglaise (immuable après création)
        name_fr:
          type: string
        name_en:
          type: string
        description_fr:
          type: string
        description_en:
          type: string
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          default: "#888888"
        sort_order:
          type: integer

    # ─── Educations / Formations ─────────────────────────────────────────────────

    Education:
      type: object
      properties:
        id:
          type: integer
        school:
          type: string
        city:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        mention:
          type: string
          nullable: true
        title:
          type: string
        level:
          type: string
        description:
          type: string
          nullable: true

    EducationWriteRequest:
      type: object
      required: [school, title, level, city, start_date]
      properties:
        school:
          type: string
        title:
          type: string
        title_en:
          type: string
        level:
          type: string
        level_en:
          type: string
        city:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        description:
          type: string
        description_en:
          type: string
        mention:
          type: string

    # ─── Expériences ────────────────────────────────────────────────────────────

    ExperienceType:
      type: string
      enum:
        - internship
        - permanent_contract
        - fixed_term_contract
        - work_study
        - freelance
        - self_employed

    Experience:
      type: object
      properties:
        id:
          type: integer
        company:
          type: string
        location:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        type:
          $ref: '#/components/schemas/ExperienceType'
        role:
          type: string
        description:
          type: string
          nullable: true
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'

    # ─── Projets ────────────────────────────────────────────────────────────────

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        github_url:
          type: string
          format: uri
          nullable: true
        is_favorite:
          type: boolean
        category:
          type: string
          enum: [web, opensource, side]
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'

    # ─── Formations (V1) ────────────────────────────────────────────────────────

    Formation:
      type: object
      properties:
        id:
          type: integer
        school:
          type: string
        city:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        mention:
          type: string
          nullable: true
        title:
          type: string
        level:
          type: string
        description:
          type: string
          nullable: true
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'

    # ─── Certifications ─────────────────────────────────────────────────────────

    Certification:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        year:
          type: integer
          nullable: true
          example: 2024
        formation_id:
          type: integer

    # ─── Profil ─────────────────────────────────────────────────────────────────

    Profile:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        status:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        about_photo_url:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        favicon_url:
          type: string
          nullable: true
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    # ─── Liens sociaux ───────────────────────────────────────────────────────────

    Link:
      type: object
      properties:
        id:
          type: integer
        platform:
          type: string
        url:
          type: string
          format: uri
        icon:
          type: string
          nullable: true
        icon_dark:
          type: string
          nullable: true

    # ─── Contact ─────────────────────────────────────────────────────────────────

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        subject:
          type: string
        message:
          type: string
        sent_at:
          type: string
          format: date-time

    # ─── CV ──────────────────────────────────────────────────────────────────────

    CvMetadata:
      type: object
      properties:
        exists:
          type: boolean
        url:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        download_name:
          type: string
          nullable: true
        external_url:
          type: string
          format: uri
          nullable: true

    # ─── i18n ────────────────────────────────────────────────────────────────────

    I18nBundle:
      type: object
      properties:
        fr:
          type: object
          description: Clés de traduction française (sections imbriquées)
        en:
          type: object
          description: Clés de traduction anglaise (sections imbriquées)

    # ─── Tab routes ──────────────────────────────────────────────────────────────

    TabRoute:
      type: object
      properties:
        tab_name:
          type: string
          enum: [about, experiences, creations, formations, contact]
        url_path:
          type: string
          pattern: '^/[a-z0-9][a-z0-9-]*$'
          example: "/about"

tags:
  - name: auth-v1
    description: |
      **V1** — Authentification par session PHP.
      Utilisée par le panneau admin `/admin/`.
  - name: auth-v2
    description: |
      **V2** — Authentification JWT Bearer.
      Refresh token rotation inclus.
  - name: profile
    description: Informations du profil portfolio (nom, bio, photo, liens…)
  - name: experiences
    description: Expériences professionnelles
  - name: projects
    description: Projets du portfolio
  - name: formations
    description: Formations / éducation (V1)
  - name: educations
    description: Formations / éducation (V2)
  - name: certifications
    description: Certifications attachées aux formations
  - name: skills
    description: Compétences techniques
  - name: categories
    description: Catégories de compétences
  - name: users
    description: Gestion des utilisateurs admin (superadmin uniquement)
  - name: contact
    description: Formulaire de contact et messages reçus
  - name: links
    description: Liens réseaux sociaux
  - name: cv
    description: CV / fichier PDF
  - name: i18n
    description: Clés de traduction de l'interface
  - name: upload
    description: Upload de fichiers (images)
  - name: utils
    description: Utilitaires (vérification URL, challenge CAPTCHA, routes onglets)

paths:

  # ═══════════════════════════════════════════════════════════════════════════════
  # V2 — AUTH
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/v2/auth/login:
    post:
      tags: [auth-v2]
      summary: Connexion (JWT)
      description: |
        Retourne un access token (JWT, 1h) et un refresh token (7 jours).
        Rate-limitée à **5 tentatives échouées** par IP par 15 minutes.
      operationId: v2AuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "400":
          description: Champs manquants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Identifiants incorrects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "429":
          description: Trop de tentatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/auth/logout:
    post:
      tags: [auth-v2]
      summary: Déconnexion (révocation JWT)
      description: Révoque le JTI du token courant dans la table `jwt_revoked_tokens`.
      operationId: v2AuthLogout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token révoqué
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/auth/refresh:
    post:
      tags: [auth-v2]
      summary: Rafraîchissement du token
      description: |
        Échange un refresh token valide contre un nouveau couple
        access token / refresh token (rotation).
      operationId: v2AuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        "200":
          description: Nouveau token émis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        "400":
          description: refresh_token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Refresh token invalide, expiré ou révoqué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/auth/me:
    get:
      tags: [auth-v2]
      summary: Profil de l'utilisateur courant
      operationId: v2AuthMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Données de l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Utilisateur introuvable (ne devrait pas arriver avec un JWT valide)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/auth/exchange:
    get:
      tags: [auth-v2]
      summary: Échange session PHP → JWT (superadmin)
      description: |
        Permet à un superadmin connecté via la session PHP V1 d'obtenir un JWT V2.
        Utile pour la migration ou les outils internes.
      operationId: v2AuthExchange
      security:
        - SessionCookie: []
      responses:
        "200":
          description: JWT émis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: Session PHP inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Rôle insuffisant (superadmin requis)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V2 — SKILLS
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/v2/skills:
    get:
      tags: [skills]
      summary: Liste des compétences (V2, public)
      operationId: v2SkillsList
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      responses:
        "200":
          description: Liste des compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
    post:
      tags: [skills]
      summary: Créer une compétence (V2)
      operationId: v2SkillsCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillWriteRequest'
      responses:
        "201":
          description: Compétence créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "403":
          description: Permission `skills.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/skills/{id}:
    put:
      tags: [skills]
      summary: Mettre à jour une compétence (V2)
      operationId: v2SkillsUpdate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillWriteRequest'
      responses:
        "200":
          description: Compétence mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Permission `skills.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [skills]
      summary: Supprimer une compétence (V2)
      operationId: v2SkillsDelete
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compétence supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Permission `skills.delete` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V2 — CATEGORIES
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/v2/categories:
    get:
      tags: [categories]
      summary: Liste des catégories (V2, public)
      operationId: v2CategoriesList
      responses:
        "200":
          description: Liste des catégories de compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags: [categories]
      summary: Créer une catégorie (V2)
      operationId: v2CategoriesCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        "201":
          description: Catégorie créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "403":
          description: Permission `categories.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Champ `key` manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/categories/{id}:
    put:
      tags: [categories]
      summary: Mettre à jour une catégorie (V2)
      description: La clé (`key`) est immuable et ignorée si fournie.
      operationId: v2CategoriesUpdate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        "200":
          description: Catégorie mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Permission manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [categories]
      summary: Supprimer une catégorie (V2)
      operationId: v2CategoriesDelete
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Catégorie supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "403":
          description: Permission `categories.delete` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════════
  # V2 — EDUCATIONS
  # ═══════════════════════════════════════════════════════════════════════════════

  /api/v2/educations:
    get:
      tags: [educations]
      summary: Liste des formations (V2, public)
      operationId: v2EducationsList
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      responses:
        "200":
          description: Liste des formations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Education'
    post:
      tags: [educations]
      summary: Créer une formation (V2)
      operationId: v2EducationsCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationWriteRequest'
      responses:
        "201":
          description: Formation créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "403":
          description: Permission `educations.write` manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/educations/{id}:
    put:
      tags: [educations]
      summary: Mettre à jour une formation (V2)
      operationId: v2EducationsUpdate
      security:
        - BearerAuth: []
      parameters:
        - name: id
