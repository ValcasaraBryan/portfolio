<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tests API v2 — JWT</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1   { color: #7ED9B1; }
    h2   { color: #aaa; margin-top: 24px; }
    .pass { color: #7ED9B1; }
    .fail { color: #ff6b6b; }
    .skip { color: #888; }
    .info { color: #7ad; }
    pre  { background: #1a1a1a; padding: 8px; border-radius: 4px; font-size: 0.8em; overflow-x: auto; }
    #summary { margin-top: 20px; font-size: 1.2em; }
  </style>
</head>
<body>
  <h1>Tests API v2 — JWT</h1>
  <p class="info">Assurez-vous que le serveur est démarré et les migrations 025-027 appliquées.</p>
  <div id="output"></div>
  <div id="summary"></div>

  <script>
    const BASE   = '../api/v2';
    let passed = 0, failed = 0;
    let accessToken  = null;
    let refreshToken = null;
    let adminToken   = null;

    const out = document.getElementById('output');

    function log(msg, cls = '') {
      const p = document.createElement('pre');
      p.className = cls;
      p.textContent = msg;
      out.appendChild(p);
    }

    function section(title) {
      const h = document.createElement('h2');
      h.textContent = title;
      out.appendChild(h);
    }

    async function test(label, fn) {
      try {
        await fn();
        log(`✓ ${label}`, 'pass');
        passed++;
      } catch (err) {
        log(`✗ ${label}\n  ${err.message}`, 'fail');
        failed++;
      }
    }

    function assert(condition, msg) {
      if (!condition) throw new Error(msg || 'Assertion failed');
    }

    async function req(method, path, body, token) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${BASE}/${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      return { status: res.status, data };
    }

    /* ─────────────────────────────────────────────────── */
    async function runTests() {

      section('1. Authentification');

      await test('POST /auth/login — identifiants manquants → 400', async () => {
        const r = await req('POST', 'auth/login', {});
        assert(r.status === 400, `Expected 400, got ${r.status}`);
      });

      await test('POST /auth/login — mauvais identifiants → 401', async () => {
        const r = await req('POST', 'auth/login', { username: 'nobody', password: 'wrong' });
        assert(r.status === 401, `Expected 401, got ${r.status}`);
      });

      await test('POST /auth/login — identifiants valides → 200 + token', async () => {
        // Utilise le premier admin créé via bdd/create_admin.php
        const ADMIN_USERNAME = prompt('Username admin (pour les tests) :', 'admin');
        const ADMIN_PASSWORD = prompt('Password admin :', '');
        if (!ADMIN_USERNAME || !ADMIN_PASSWORD) {
          throw new Error('Test ignoré — identifiants non fournis');
        }
        const r = await req('POST', 'auth/login', {
          username: ADMIN_USERNAME,
          password: ADMIN_PASSWORD,
        });
        assert(r.status === 200, `Expected 200, got ${r.status}`);
        assert(typeof r.data.token === 'string', 'No token in response');
        assert(typeof r.data.refresh_token === 'string', 'No refresh_token');
        accessToken  = r.data.token;
        refreshToken = r.data.refresh_token;
        adminToken   = r.data.token;
        log(`  ↳ role: ${r.data.user.role}, token: ${accessToken.substring(0, 30)}…`, 'info');
      });

      section('2. Routes publiques (sans token)');

      await test('GET /categories → 200', async () => {
        const r = await req('GET', 'categories');
        assert(r.status === 200, `Expected 200, got ${r.status}`);
        assert(Array.isArray(r.data), 'Expected array');
      });

      await test('GET /skills?lang=fr → 200', async () => {
        const r = await req('GET', 'skills?lang=fr');
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      await test('GET /educations?lang=en → 200', async () => {
        const r = await req('GET', 'educations?lang=en');
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      section('3. Routes protégées sans token → 401');

      await test('POST /categories sans token → 401', async () => {
        const r = await req('POST', 'categories', { key: 'test' });
        assert(r.status === 401, `Expected 401, got ${r.status}`);
      });

      await test('POST /skills sans token → 401', async () => {
        const r = await req('POST', 'skills', { name_fr: 'Test' });
        assert(r.status === 401, `Expected 401, got ${r.status}`);
      });

      await test('GET /users sans token → 401', async () => {
        const r = await req('GET', 'users');
        assert(r.status === 401, `Expected 401, got ${r.status}`);
      });

      section('4. Auth — token valide');

      await test('GET /auth/me avec token → profil utilisateur', async () => {
        if (!accessToken) throw new Error('Pas de token (login non effectué)');
        const r = await req('GET', 'auth/me', null, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
        assert(typeof r.data.username === 'string', 'No username in /me');
      });

      section('5. CRUD Catégories');

      let catId = null;
      await test('POST /categories avec token → 201', async () => {
        if (!accessToken) throw new Error('Pas de token');
        const r = await req('POST', 'categories', {
          key: '__test__', name_fr: 'Test FR', name_en: 'Test EN', color: '#aabbcc',
        }, accessToken);
        assert(r.status === 201, `Expected 201, got ${r.status}: ${JSON.stringify(r.data)}`);
        catId = r.data.id;
      });

      await test('PUT /categories/:id → 200', async () => {
        if (!catId) throw new Error('Pas d\'ID de catégorie');
        const r = await req('PUT', `categories/${catId}`, {
          name_fr: 'Test FR Modifié', name_en: 'Test EN Modified', color: '#7ED9B1',
        }, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      await test('DELETE /categories/:id → 200', async () => {
        if (!catId) throw new Error('Pas d\'ID de catégorie');
        const r = await req('DELETE', `categories/${catId}`, null, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      section('6. CRUD Skills');

      let skillId = null;
      await test('POST /skills avec token → 201', async () => {
        if (!accessToken) throw new Error('Pas de token');
        const r = await req('POST', 'skills', {
          name_fr: 'Test Skill FR', name_en: 'Test Skill EN',
          category_key: 'Front-End',
          description_fr: 'Desc FR', description_en: 'Desc EN',
        }, accessToken);
        assert(r.status === 201, `Expected 201, got ${r.status}: ${JSON.stringify(r.data)}`);
        skillId = r.data.id;
      });

      await test('PUT /skills/:id → 200', async () => {
        if (!skillId) throw new Error('Pas d\'ID de skill');
        const r = await req('PUT', `skills/${skillId}`, {
          name_fr: 'Updated FR', name_en: 'Updated EN', category_key: 'Front-End',
        }, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      await test('DELETE /skills/:id → 200', async () => {
        if (!skillId) throw new Error('Pas d\'ID de skill');
        const r = await req('DELETE', `skills/${skillId}`, null, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      section('7. CRUD Educations');

      let eduId = null;
      await test('POST /educations avec token → 201', async () => {
        if (!accessToken) throw new Error('Pas de token');
        const r = await req('POST', 'educations', {
          school: 'École Test', title: 'Formation Test',
          level: 'Bac+2', city: 'Paris',
          start_date: '2022-09-01', end_date: '2024-06-30',
        }, accessToken);
        assert(r.status === 201, `Expected 201, got ${r.status}: ${JSON.stringify(r.data)}`);
        eduId = r.data.id;
      });

      await test('DELETE /educations/:id → 200', async () => {
        if (!eduId) throw new Error('Pas d\'ID d\'éducation');
        const r = await req('DELETE', `educations/${eduId}`, null, accessToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      section('8. Refresh token');

      let newToken = null;
      await test('POST /auth/refresh → nouveau token', async () => {
        if (!refreshToken) throw new Error('Pas de refresh_token');
        const r = await req('POST', 'auth/refresh', { refresh_token: refreshToken });
        assert(r.status === 200, `Expected 200, got ${r.status}: ${JSON.stringify(r.data)}`);
        assert(typeof r.data.token === 'string', 'No new token');
        newToken = r.data.token;
        refreshToken = r.data.refresh_token; // rotation
        log(`  ↳ nouveau token: ${newToken.substring(0, 30)}…`, 'info');
      });

      await test('Ancien refresh_token révoqué après rotation → 401', async () => {
        // Le refresh_token original a été révoqué lors du refresh
        // (test uniquement si on a capturé l'ancien token — ici on utilise newToken)
        // Ce test vérifie que le flux de rotation fonctionne
        if (!newToken) throw new Error('Pas de nouveau token');
        const r = await req('GET', 'auth/me', null, newToken);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      section('9. Logout — révocation de token');

      let tokenToRevoke = newToken || accessToken;
      await test('POST /auth/logout → 200', async () => {
        if (!tokenToRevoke) throw new Error('Pas de token');
        const r = await req('POST', 'auth/logout', null, tokenToRevoke);
        assert(r.status === 200, `Expected 200, got ${r.status}`);
      });

      await test('Token révoqué réutilisé → 401', async () => {
        if (!tokenToRevoke) throw new Error('Pas de token');
        const r = await req('GET', 'auth/me', null, tokenToRevoke);
        assert(r.status === 401, `Expected 401, got ${r.status}`);
      });

      section('10. Journalisation');

      log('  Vérification manuelle : ouvrir logs/api-v2-YYYY-MM-DD.log en dehors du webroot.', 'info');
      log('  Chaque requête ci-dessus doit avoir généré une ligne JSON.', 'info');

      /* Résumé */
      const total = passed + failed;
      const pct   = total ? Math.round(passed / total * 100) : 0;
      const summary = document.getElementById('summary');
      summary.innerHTML = `
        <hr style="border-color:#333;margin:20px 0">
        <span class="${failed === 0 ? 'pass' : 'fail'}">
          ${passed}/${total} tests réussis (${pct}%)
          ${failed > 0 ? `— ${failed} échec(s)` : '— Tout OK ✓'}
        </span>
      `;
    }

    runTests().catch(err => {
      log(`Erreur fatale: ${err.message}`, 'fail');
    });
  </script>
</body>
</html>
